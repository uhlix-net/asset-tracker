name: asset_tracker_mobile
description: Asset Tracker — Mobile Companion for Android
version: 1.0.0+1

publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (requires Flutter >=3.22)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Encryption (pure Dart — no native Android code)
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Utilities (pure Dart)
  intl: ^0.19.0

  # NOTE: flutter_secure_storage removed.
  # Despite v9 claiming to remove Android v1 embedding support, its
  # Android companion object retains PluginRegistry.Registrar which
  # triggers Flutter 3.22's deleted-v1-embedding check.
  # Credentials are no longer persisted between sessions; users re-enter
  # them each time they open the app (the AES sync key is held in memory).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
