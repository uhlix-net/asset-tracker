name: asset_tracker_mobile
description: Asset Tracker — Mobile Companion for Android
version: 1.0.0+1

publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Encryption (pure Dart — no native Android code)
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Secure storage (sync password in Android Keystore)
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0

  # NOTE: cached_network_image and flutter_spinkit removed.
  # cached_network_image pulled in sqflite (via flutter_cache_manager)
  # which retains PluginRegistry.Registrar — triggering Flutter 3.22's
  # "deleted Android v1 embedding" check.  Neither package is used in
  # the app code (images load as bytes, spinners use CircularProgressIndicator).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
