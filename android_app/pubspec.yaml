name: asset_tracker_mobile
description: Asset Tracker — Mobile Companion for Android
version: 1.0.0+1

publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Secure storage (sync password in Android Keystore)
  flutter_secure_storage: ^9.2.2

  # UI helpers
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  flutter_spinkit: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
