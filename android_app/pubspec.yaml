name: asset_tracker_mobile
description: Asset Tracker — Mobile Companion for Android
version: 1.0.0+1

publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase v2.x — compatible with Flutter >=3.19.0
  # (v3.x requires Flutter 3.22 which has over-aggressive v1-embedding checks)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7

  # Encryption (pure Dart — no native Android code)
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Utilities (pure Dart)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
