plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace         "net.uhlix.assettracker"
    compileSdk        flutter.compileSdkVersion
    ndkVersion        flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions { jvmTarget = "1.8" }

    defaultConfig {
        applicationId   "net.uhlix.assettracker"
        // Firebase requires minSdk 21; explicit value avoids flutter.minSdkVersion
        // resolving too low and triggering v1 embedding checks in some plugin versions.
        minSdk          21
        targetSdk       flutter.targetSdkVersion
        versionCode     flutter.versionCode
        versionName     flutter.versionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig   signingConfigs.debug   // swap for keystore in production
            minifyEnabled   false
            shrinkResources false
        }
    }
}

flutter { source "../.." }
