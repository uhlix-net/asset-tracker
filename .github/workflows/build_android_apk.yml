name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      # Write the real google-services.json from a GitHub secret.
      # To configure: base64-encode your real file and store as secret
      # GOOGLE_SERVICES_JSON in Settings → Secrets → Actions.
      - name: Write google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' \
            > android_app/android/app/google-services.json

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
