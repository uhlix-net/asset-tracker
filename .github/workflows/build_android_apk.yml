name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Write the real google-services.json from a GitHub secret.
      # To configure: store the JSON contents as secret GOOGLE_SERVICES_JSON
      # in Settings → Secrets → Actions.  If the secret is absent the
      # placeholder file committed to the repo is used (build succeeds but
      # the app will not connect to Firebase).
      - name: Write google-services.json
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            echo "$GSJ" > android_app/android/app/google-services.json
          fi

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      - name: Patch Flutter to bypass v1 embedding checks and delete snapshot
        run: |
          # Patch 1: build_apk.dart - return DeprecationBehavior.none so checkForDeprecation is skipped
          APKFILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/commands/build_apk.dart"
          sed -i "s|boolArg('ignore-deprecation') ? DeprecationBehavior.ignore : DeprecationBehavior.exit|DeprecationBehavior.none|g" "$APKFILE"
          echo "build_apk.dart patch:" && grep "DeprecationBehavior" "$APKFILE" | tail -2
          # Patch 2: project.dart - make getEmbeddingVersion() always return v2 to avoid xml namespace getAttribute bug
          PROJFILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/project.dart"
          python3 - "$PROJFILE" << 'PYEOF'
import sys, re
f = sys.argv[1]
c = open(f).read()
# Replace getEmbeddingVersion body to always return v2
c = re.sub(
  r'(AndroidEmbeddingVersion getEmbeddingVersion\(\) \{)[^}]+\}',
  r'\1\n    // Workaround: xml 6.6.1 getAttribute namespace bug prevents flutterEmbedding detection\n    return AndroidEmbeddingVersion.v2;\n  }',
  c, count=1)
open(f, 'w').write(c)
print("project.dart getEmbeddingVersion patched")
PYEOF
          # Delete snapshot so Flutter recompiles from patched source
          rm -f "$FLUTTER_ROOT/bin/cache/flutter_tools.snapshot"
          rm -f "$FLUTTER_ROOT/bin/cache/flutter_tools.stamp"
          echo "All patches applied and snapshot deleted."

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
