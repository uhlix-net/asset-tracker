name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Write the real google-services.json from a GitHub secret.
      # To configure: store the JSON contents as secret GOOGLE_SERVICES_JSON
      # in Settings → Secrets → Actions.  If the secret is absent the
      # placeholder file committed to the repo is used (build succeeds but
      # the app will not connect to Firebase).
      - name: Write google-services.json
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            echo "$GSJ" > android_app/android/app/google-services.json
          fi

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      - name: Show generated android files after pub get
        run: |
          echo "=== GeneratedPluginRegistrant ===" && find android_app/android -name "GeneratedPluginRegistrant*" -exec cat {} \; 2>/dev/null || echo "not found"
          echo "=== flutter_export_environment.sh ===" && cat android_app/android/flutter_export_environment.sh 2>/dev/null || echo "not found"
          echo "=== Flutter snapshot exists ===" && ls -la "$FLUTTER_ROOT/bin/cache/flutter_tools.snapshot" 2>/dev/null || echo "no snapshot"

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
