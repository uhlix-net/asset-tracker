name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      # Write the real google-services.json from a GitHub secret.
      # To configure: store the JSON contents as secret GOOGLE_SERVICES_JSON
      # in Settings → Secrets → Actions.  If the secret is absent the
      # placeholder file committed to the repo is used (build succeeds but
      # the app will not connect to Firebase).
      - name: Write google-services.json
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            echo "$GSJ" > android_app/android/app/google-services.json
          fi

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      - name: Diagnose xml getAttribute source
        run: |
          XMLSRC=$(find "$FLUTTER_ROOT" -path "*/xml-*/lib/src/xml/mixins/has_attributes.dart" 2>/dev/null | head -1)
          echo "xml package: $XMLSRC"
          if [ -n "$XMLSRC" ]; then grep -A30 "getAttributeNode" "$XMLSRC" | head -40; fi
          XMLVER=$(find "$FLUTTER_ROOT" -name "pubspec.yaml" -path "*/xml-*/pubspec.yaml" 2>/dev/null | head -1)
          if [ -n "$XMLVER" ]; then grep "^version:" "$XMLVER"; fi

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
