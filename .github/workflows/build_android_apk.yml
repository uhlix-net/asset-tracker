name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: false   # force fresh download to avoid stale patched snapshot

      # Write the real google-services.json from a GitHub secret.
      # To configure: store the JSON contents as secret GOOGLE_SERVICES_JSON
      # in Settings → Secrets → Actions.  If the secret is absent the
      # placeholder file committed to the repo is used (build succeeds but
      # the app will not connect to Firebase).
      - name: Write google-services.json
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            echo "$GSJ" > android_app/android/app/google-services.json
          fi

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      # ── DIAGNOSTIC BLOCK ────────────────────────────────────────────────────

      - name: "[diag] xml element.dart getAttributeNode override"
        run: grep -A40 "getAttributeNode" /home/runner/.pub-cache/hosted/pub.dev/xml-6.5.0/lib/src/xml/nodes/element.dart 2>/dev/null | head -45

      - name: "[diag] xml XmlName qualified property"
        run: grep -B2 -A10 "String get qualified\|get qualified" /home/runner/.pub-cache/hosted/pub.dev/xml-6.5.0/lib/src/xml/utils/name.dart 2>/dev/null | head -30

      - name: "[diag] Dart getAttribute test on our manifest"
        working-directory: diagnostics/xmltest
        run: dart pub get && dart run bin/test_getattr.dart ../../android_app/android/app/src/main/AndroidManifest.xml

      - name: "[diag] Fresh flutter create — build minimal app"
        run: |
          flutter create --org net.uhlix /tmp/minimalapp
          cd /tmp/minimalapp && flutter build apk --release
        continue-on-error: true

      - name: "[diag] Compare fresh-app manifest vs ours"
        run: |
          echo "=== Fresh flutter create manifest ===" && cat /tmp/minimalapp/android/app/src/main/AndroidManifest.xml || echo "fresh app not created"
          echo "=== Our manifest ===" && cat android_app/android/app/src/main/AndroidManifest.xml

      - name: "[diag] Add Firebase to fresh app and build"
        run: |
          cd /tmp/minimalapp
          # Inject Firebase deps into fresh app pubspec
          sed -i '/^dependencies:/a\  firebase_core: ^2.32.0\n  cloud_firestore: ^4.17.5' pubspec.yaml
          echo "=== pubspec after Firebase injection ===" && grep -A6 "^dependencies:" pubspec.yaml
          # Add google-services plugin to settings.gradle
          sed -i 's|id "com.android.application"|id "com.android.application"\n  id "com.google.gms.google-services" version "4.4.0" apply false|' android/settings.gradle
          sed -i 's|id "com.android.application"|id "com.android.application"\n  id "com.google.gms.google-services"|' android/app/build.gradle
          # Copy our google-services.json placeholder
          cp "$GITHUB_WORKSPACE/android_app/android/app/google-services.json" android/app/ 2>/dev/null || echo "no google-services.json, using placeholder" && echo '{"project_info":{"project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000"},"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json
          flutter pub get
          echo "=== flutter build apk result ==="
          flutter build apk --release && echo "BUILD SUCCESS" || echo "BUILD FAILED: exit $?"
        continue-on-error: true

      # ── END DIAGNOSTIC BLOCK ────────────────────────────────────────────────

      - name: "[diag] Confirm manifest and Flutter snapshot are clean"
        run: |
          echo "Flutter version:" && flutter --version | head -2
          echo "Snapshot:" && ls -la "$FLUTTER_ROOT/bin/cache/flutter_tools.snapshot" | awk '{print $5, $6, $7, $8, $9}'
          echo "Manifest before build:" && cat android_app/android/app/src/main/AndroidManifest.xml

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
