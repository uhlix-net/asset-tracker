name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/build_android_apk.yml"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Write the real google-services.json from a GitHub secret.
      # To configure: store the JSON contents as secret GOOGLE_SERVICES_JSON
      # in Settings → Secrets → Actions.  If the secret is absent the
      # placeholder file committed to the repo is used (build succeeds but
      # the app will not connect to Firebase).
      - name: Write google-services.json
        env:
          GSJ: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GSJ" ]; then
            echo "$GSJ" > android_app/android/app/google-services.json
          fi

      - name: Flutter pub get
        working-directory: android_app
        run: flutter pub get

      - name: Patch Flutter embedding check and delete snapshot
        run: |
          PFILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/project.dart"
          NS="http://schemas.android.com/apk/res/android"
          # Fix: use namespace-aware getAttribute with prefix-based fallback
          sed -i "s|metaData\.getAttribute('android:name')|metaData.getAttribute('name', namespace: '$NS') ?? metaData.getAttribute('android:name')|g" "$PFILE"
          sed -i "s|metaData\.getAttribute('android:value')|metaData.getAttribute('value', namespace: '$NS') ?? metaData.getAttribute('android:value')|g" "$PFILE"
          # Fix the application check too
          sed -i "s|application\.getAttribute('android:name')|application.getAttribute('name', namespace: '$NS') ?? application.getAttribute('android:name')|g" "$PFILE"
          # Delete snapshot so Flutter recompiles from patched source
          rm -f "$FLUTTER_ROOT/bin/cache/flutter_tools.snapshot"
          rm -f "$FLUTTER_ROOT/bin/cache/flutter_tools.stamp"
          echo "Patch applied. Snapshot deleted."

      - name: Build release APK
        working-directory: android_app
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssetTracker-Android-${{ github.sha }}
          path: android_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
